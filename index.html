<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB TEK | Lydteknik & Installation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #080808;
            --glass-bg: rgba(15, 15, 15, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at 0% 0%, #1a1a1a 0%, #080808 100%);
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 4rem;
            width: 90%;
            max-width: 650px;
            text-align: left; /* Venstrestiller alt */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.2rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .services {
            list-style: none;
            margin-bottom: 3rem;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 1.5rem;
        }

        .services li {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.1rem;
            margin-bottom: 0.8rem;
            color: #e0e0e0;
            text-transform: uppercase;
        }

        .contact-info {
            margin-bottom: 4rem;
        }

        .contact-info a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            transition: opacity 0.2s;
        }

        .contact-info a:hover {
            opacity: 0.6;
        }

        footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.8;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
        }

        .company-name {
            color: #ffffff;
            font-weight: 600;
            display: block;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Lydteknik & Installation</h1>

        <ul class="services">
            <li>Reparation af lyd- & svagstrømsteknik</li>
            <li>Trædesign & Installation</li>
            <li>Certificeret mandskab til koncert- & byggebranchen</li>
        </ul>

        <div class="contact-info">
            <a href="mailto:info@nbtek.dk">ALLE HENVENDELSER: INFO@NBTEK.DK</a>
        </div>

        <footer>
            <span class="company-name">NB TEK</span>
            Refshalevej 194<br>
            1432 København K<br>
            CVR: 32699022
        </footer>
    </div>

</body>
</html>
