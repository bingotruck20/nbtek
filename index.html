<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB TEK | Installation & Teknik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --glass-bg: rgba(20, 20, 20, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Dynamisk animeret baggrund */
        .ambient-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vh;
            transform: translate(-50%, -50%);
            background: 
                radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.04), transparent 30%),
                radial-gradient(circle at 80% 60%, rgba(255, 255, 255, 0.03), transparent 30%);
            animation: drift 15s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(3deg) scale(1.05); }
        }

        /* Forbedret Glassmorphism Card */
        .glass-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3.5rem 2.5rem;
            width: 90%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* Logo & Typografi */
        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 0.4rem;
            margin-bottom: 2.5rem;
            background: linear-gradient(180deg, #ffffff 0%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .services {
            list-style: none;
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .services li {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.15rem;
            color: #c4c4c4;
            text-transform: uppercase;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .services li:hover {
            color: #ffffff;
            transform: scale(1.02);
        }

        /* Premium Knap */
        .contact-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15rem;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            margin-bottom: 3.5rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .contact-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Footer */
        footer {
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.8;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
        }

        footer strong {
            color: #aaaaaa;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="glass-container">
        <div class="logo-text">NB TEK</div>

        <ul class="services">
            <li>Lydteknik & Installation</li>
            <li>Reparation af Lyd- & Svagstrømsteknik</li>
            <li>Trædesign & Installation</li>
            <li>Certificeret Mandskab</li>
        </ul>

        <a href="mailto:info@nbtek.dk" class="contact-btn">info@nbtek.dk</a>

        <footer>
            <strong>NB TEK</strong><br>
            Refshalevej 194<br>
            1432 København K<br>
            CVR: 32699022
        </footer>
    </div>
</body>
</html>
