<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB TEK | Lydteknik & Installation</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Forhindrer scroll - "Above the fold" */
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        /* Glassmorphism Container */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Logotype Plads */
        .logo-area {
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: 0.2rem;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .logo-placeholder {
            max-width: 150px;
            filter: brightness(0) invert(1); /* Gør sort logo hvidt */
        }

        /* Indhold */
        .services {
            list-style: none;
            margin-bottom: 2.5rem;
        }

        .services li {
            font-size: 0.85rem;
            letter-spacing: 0.1rem;
            margin: 0.8rem 0;
            color: #cccccc;
            text-transform: uppercase;
        }

        .contact-link {
            display: block;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 3rem;
            transition: opacity 0.3s;
        }

        .contact-link:hover {
            opacity: 0.7;
        }

        /* Footer Info */
        footer {
            font-size: 0.7rem;
            color: #666666;
            line-height: 1.5;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        /* Animation til baggrund */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 0.6; }
            100% { opacity: 0.4; }
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #2563eb10 0%, transparent 50%);
            animation: pulse 8s infinite ease-in-out;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="glass-card">
        <div class="logo-area">
            <img src="https://placehold.co/300x100/000/fff?text=NB+TEK" alt="NB TEK LOGO" class="logo-placeholder">
        </div>

        <ul class="services">
            <li>Lydteknik & Installation</li>
            <li>Reparation af lyd- & svagstrømsteknik</li>
            <li>Trædesign & Installation</li>
            <li>Certificeret mandskab til koncert- & byggebranchen</li>
        </ul>

        <a href="mailto:info@nbtek.dk" class="contact-link">ALLE HENVENDELSER: INFO@NBTEK.DK</a>

        <footer>
            NB TEK<br>
            REFSHALEVEJ $194$<br>
            $1432$ KØBENHAVN K<br>
            CVR: $32699022$
        </footer>
    </div>
</body>
</html>
